<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe 💕</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #e91e8c;
      --pink-light: #fce4f3;
      --pink-dark: #c0146f;
      --purple: #9c27b0;
      --purple-light: #f3e5f5;
      --bg: #fff0f8;
      --card: #ffffff;
      --text: #2d1b2e;
      --muted: #8a6a8e;
      --border: #f0c8e8;
      --radius: 16px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      color: var(--text);
    }

    h1 {
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 2rem;
      text-align: center;
    }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(233,30,140,0.08);
    }

    /* ── LOBBY ── */
    #lobby { text-align: center; }

    .lobby-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      color: var(--text);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: transform 0.1s, opacity 0.1s;
      width: 100%;
      margin-bottom: 0.75rem;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff;
    }
    .btn-secondary {
      background: var(--pink-light);
      color: var(--pink-dark);
    }

    .divider {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin: 0.75rem 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    input[type="text"] {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--bg);
      margin-bottom: 0.75rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: var(--pink); }
    input[type="text"]::placeholder { color: var(--muted); }

    /* ── SHARE ── */
    .share-box {
      background: var(--pink-light);
      border: 1.5px dashed var(--pink);
      border-radius: 12px;
      padding: 1rem;
      margin: 1rem 0;
      text-align: center;
    }
    .share-box p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .share-url {
      font-size: 0.78rem;
      word-break: break-all;
      color: var(--pink-dark);
      font-weight: 600;
      cursor: pointer;
      background: white;
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      display: block;
      margin-bottom: 0.5rem;
    }
    .copy-hint { font-size: 0.75rem; color: var(--muted); }

    .waiting-dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }

    /* ── GAME ── */
    #game { display: none; }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
      gap: 0.5rem;
    }

    .player-tag {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.8rem;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      border: 1.5px solid transparent;
    }
    .player-tag.x-tag { background: var(--pink-light); color: var(--pink-dark); border-color: var(--pink); }
    .player-tag.o-tag { background: var(--purple-light); color: var(--purple); border-color: var(--purple); }
    .player-tag.active { box-shadow: 0 0 0 3px rgba(233,30,140,0.18); }

    .turn-label {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      flex: 1;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.25rem;
    }

    .cell {
      aspect-ratio: 1;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 800;
      cursor: pointer;
      transition: background 0.12s, transform 0.1s, border-color 0.12s;
      user-select: none;
      line-height: 1;
    }
    .cell:hover:not(.taken) { background: var(--pink-light); border-color: var(--pink); transform: scale(1.03); }
    .cell.taken { cursor: default; }
    .cell.x { color: var(--pink); }
    .cell.o { color: var(--purple); }
    .cell.win-cell { background: var(--pink-light); border-color: var(--pink); animation: pulse 0.4s ease; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }

    .game-message {
      text-align: center;
      font-size: 1rem;
      font-weight: 600;
      color: var(--pink);
      min-height: 1.5em;
      margin-bottom: 0.75rem;
    }

    .scores {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .score-item { text-align: center; }
    .score-num { font-size: 1.4rem; font-weight: 700; color: var(--text); display: block; line-height: 1; }

    .btn-sm {
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      border-radius: 10px;
      margin-bottom: 0;
    }

    .leave-btn {
      background: none;
      border: 1.5px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
      border-radius: 8px;
      padding: 0.35rem 0.75rem;
      cursor: pointer;
      margin-top: 0.75rem;
      width: 100%;
    }
    .leave-btn:hover { border-color: var(--pink); color: var(--pink-dark); }

    .opponent-left {
      background: #fff3f3;
      border: 1.5px solid #f5c6c6;
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      margin-bottom: 0.75rem;
      font-size: 0.9rem;
      color: #c0392b;
    }

    /* ── SETUP MODAL ── */
    .name-setup { margin-bottom: 1rem; }
    .name-setup label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--muted); margin-bottom: 0.4rem; }

    /* toast */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--text);
      color: #fff;
      padding: 0.6rem 1.2rem;
      border-radius: 10px;
      font-size: 0.85rem;
      z-index: 999;
      transition: transform 0.3s ease;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    #loading {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 2rem;
    }

    @media (max-width: 440px) {
      .card { padding: 1.25rem; }
    }
  </style>
</head>
<body>

<h1>Tic-Tac-Toe 💕</h1>
<p class="tagline">Play live with someone you love</p>

<div class="card">
  <div id="loading">Connecting<span class="waiting-dots"></span></div>

  <!-- LOBBY -->
  <div id="lobby" style="display:none;">
    <div class="name-setup">
      <label for="playerName">Your name</label>
      <input id="playerName" type="text" placeholder="e.g. Alex" maxlength="16" />
    </div>

    <button class="btn btn-primary" id="createBtn">✨ Create a new game</button>
    <div class="divider">or join one</div>
    <input id="roomInput" type="text" placeholder="Room code e.g. ABC123" maxlength="8" style="text-transform:uppercase;" />
    <button class="btn btn-secondary" id="joinBtn">🔗 Join game</button>
  </div>

  <!-- WAITING ROOM -->
  <div id="waiting" style="display:none; text-align:center;">
    <p style="font-size:1rem; font-weight:600; margin-bottom:1rem;">Game created! 🎉</p>
    <div class="share-box">
      <p>Send this link to your girlfriend:</p>
      <span class="share-url" id="shareUrl" onclick="copyLink()"></span>
      <p class="copy-hint">Tap to copy</p>
    </div>
    <p style="font-size:0.9rem; color:var(--muted);">Waiting for them to join<span class="waiting-dots"></span></p>
    <button class="leave-btn" onclick="leaveGame()">← Back to lobby</button>
  </div>

  <!-- GAME -->
  <div id="game">
    <div class="status-bar">
      <div class="player-tag x-tag" id="xTag">❌ —</div>
      <div class="turn-label" id="turnLabel">•</div>
      <div class="player-tag o-tag" id="oTag">⭕ —</div>
    </div>

    <div class="scores">
      <div class="score-item">
        <span class="score-num" id="scoreX">0</span>
        <span id="scoreXLabel">X</span>
      </div>
      <div class="score-item">
        <span class="score-num" id="scoreTies">0</span>
        <span>Ties</span>
      </div>
      <div class="score-item">
        <span class="score-num" id="scoreO">0</span>
        <span id="scoreOLabel">O</span>
      </div>
    </div>

    <div id="opponentLeft" class="opponent-left" style="display:none;">
      Your partner disconnected. Waiting for them to reconnect<span class="waiting-dots"></span>
    </div>

    <div class="board" id="board">
      <div class="cell" data-i="0"></div>
      <div class="cell" data-i="1"></div>
      <div class="cell" data-i="2"></div>
      <div class="cell" data-i="3"></div>
      <div class="cell" data-i="4"></div>
      <div class="cell" data-i="5"></div>
      <div class="cell" data-i="6"></div>
      <div class="cell" data-i="7"></div>
      <div class="cell" data-i="8"></div>
    </div>

    <p class="game-message" id="gameMsg"></p>
    <button class="btn btn-primary btn-sm" id="replayBtn" style="display:none;" onclick="requestReplay()">Play again 💕</button>
    <button class="leave-btn" onclick="leaveGame()">← Leave game</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
// Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyAEEOMMBGJoNgIFOzlFLNyVZVue7Yw1jmg",
    authDomain: "marufaman-9b65b.firebaseapp.com",
    databaseURL: "https://marufaman-9b65b-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "marufaman-9b65b",
    storageBucket: "marufaman-9b65b.firebasestorage.app",
    messagingSenderId: "44585045384",
    appId: "1:44585045384:web:50323c075a994aec6fbe3d",
    measurementId: "G-JFZC7VXBF5"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
// ── State ──
let myRole = null; // 'X' or 'O'
let roomId = null;
let myName = '';
let gameRef = null;
let presenceRef = null;
let scores = { X: 0, O: 0, ties: 0 };
let gameOver = false;
let replayRequested = false;

const WIN_LINES = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

// ── Utils ──
function genRoomId() {
  return Math.random().toString(36).substring(2,8).toUpperCase();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function showSection(id) {
  ['loading','lobby','waiting','game'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
}

function getSavedName() {
  return localStorage.getItem('ttt_name') || '';
}
function saveName(n) {
  localStorage.setItem('ttt_name', n);
}

function getMyName() {
  const n = document.getElementById('playerName').value.trim();
  return n || 'Player';
}

// ── Check URL for room param ──
function getRoomFromUrl() {
  const p = new URLSearchParams(window.location.search);
  return p.get('room');
}

function setRoomInUrl(rid) {
  const url = new URL(window.location.href);
  url.searchParams.set('room', rid);
  window.history.replaceState({}, '', url);
}

function clearRoomFromUrl() {
  const url = new URL(window.location.href);
  url.searchParams.delete('room');
  window.history.replaceState({}, '', url);
}

// ── Init ──
async function init() {
  document.getElementById('playerName').value = getSavedName();

  const rid = getRoomFromUrl();
  if (rid) {
    // Try to auto-join
    const snap = await get(ref(db, `rooms/${rid}`));
    if (snap.exists()) {
      showSection('lobby');
      document.getElementById('roomInput').value = rid;
      document.getElementById('playerName').focus();
    } else {
      showSection('lobby');
    }
  } else {
    showSection('lobby');
  }
}

// ── Create Game ──
async function createGame() {
  const name = getMyName();
  saveName(name);
  roomId = genRoomId();
  myRole = 'X';
  myName = name;

  await set(ref(db, `rooms/${roomId}`), {
    board: Array(9).fill(''),
    turn: 'X',
    players: { X: { name, online: true }, O: null },
    status: 'waiting',
    scores: { X: 0, O: 0, ties: 0 },
    createdAt: serverTimestamp()
  });

  setRoomInUrl(roomId);

  const shareLink = window.location.href;
  document.getElementById('shareUrl').textContent = shareLink;

  showSection('waiting');
  listenRoom();
  setupPresence();
}

// ── Join Game ──
async function joinGame() {
  const name = getMyName();
  saveName(name);
  const code = (document.getElementById('roomInput').value || getRoomFromUrl() || '').trim().toUpperCase();
  if (!code) { showToast('Enter a room code'); return; }

  const snap = await get(ref(db, `rooms/${code}`));
  if (!snap.exists()) { showToast('Room not found 😕'); return; }

  const data = snap.val();
  if (data.status === 'playing' && data.players.O) {
    showToast('Game is full 😕'); return;
  }

  roomId = code;
  myRole = 'O';
  myName = name;

  await update(ref(db, `rooms/${roomId}/players`), { O: { name, online: true } });
  await update(ref(db, `rooms/${roomId}`), { status: 'playing' });

  setRoomInUrl(roomId);
  listenRoom();
  setupPresence();
}

// ── Presence ──
function setupPresence() {
  presenceRef = ref(db, `rooms/${roomId}/players/${myRole}/online`);
  set(presenceRef, true);
  onDisconnect(presenceRef).set(false);
}

// ── Listen to room ──
function listenRoom() {
  gameRef = ref(db, `rooms/${roomId}`);
  onValue(gameRef, snap => {
    if (!snap.exists()) { leaveGame(); return; }
    const data = snap.val();
    renderGame(data);
  });
}

// ── Render ──
function renderGame(data) {
  const { board, turn, players, status, scores: sc, winner, winLine, replayVotes } = data;

  if (status === 'waiting') {
    showSection('waiting');
    return;
  }

  showSection('game');

  const xName = players?.X?.name || 'X';
  const oName = players?.O?.name || 'O';
  const xOnline = players?.X?.online;
  const oOnline = players?.O?.online;

  // names
  document.getElementById('xTag').textContent = '❌ ' + xName;
  document.getElementById('oTag').textContent = '⭕ ' + oName;

  document.getElementById('scoreXLabel').textContent = xName;
  document.getElementById('scoreOLabel').textContent = oName;

  if (sc) {
    document.getElementById('scoreX').textContent = sc.X || 0;
    document.getElementById('scoreO').textContent = sc.O || 0;
    document.getElementById('scoreTies').textContent = sc.ties || 0;
    scores = sc;
  }

  // active turn highlight
  document.getElementById('xTag').classList.toggle('active', turn === 'X' && !winner);
  document.getElementById('oTag').classList.toggle('active', turn === 'O' && !winner);

  // opponent online
  const oppRole = myRole === 'X' ? 'O' : 'X';
  const oppOnline = oppRole === 'X' ? xOnline : oOnline;
  document.getElementById('opponentLeft').style.display = (!oppOnline && status === 'playing') ? 'block' : 'none';

  // board
  const cells = document.querySelectorAll('.cell');
  cells.forEach((cell, i) => {
    const val = board[i];
    cell.textContent = val === 'X' ? '✕' : val === 'O' ? '○' : '';
    cell.className = 'cell' + (val ? ' taken ' + val.toLowerCase() : '');
    if (winLine && winLine.includes(i)) cell.classList.add('win-cell');
  });

  gameOver = !!winner || status === 'draw';

  // message
  const msg = document.getElementById('gameMsg');
  const replay = document.getElementById('replayBtn');

  if (winner) {
    const winName = winner === 'X' ? xName : oName;
    msg.textContent = (winner === myRole ? '🎉 You won!' : `${winName} wins! 💪`);
    replay.style.display = 'block';
  } else if (status === 'draw') {
    msg.textContent = "It's a tie! 🤝";
    replay.style.display = 'block';
  } else {
    msg.textContent = '';
    replay.style.display = 'none';
    // turn label
    if (turn === myRole) {
      document.getElementById('turnLabel').textContent = 'Your turn';
    } else {
      const oppName = myRole === 'X' ? oName : xName;
      document.getElementById('turnLabel').textContent = `${oppName}'s turn`;
    }
  }

  // replay votes
  if (replayVotes) {
    const myVote = replayVotes[myRole];
    const oppVote = replayVotes[oppRole];
    if (myVote && !oppVote) {
      msg.textContent = 'Waiting for ' + (oppRole === 'X' ? xName : oName) + ' to agree<span class="waiting-dots"></span>';
    }
  }
}

// ── Make move ──
async function makeMove(i) {
  if (!gameRef || gameOver) return;
  const snap = await get(gameRef);
  const data = snap.val();
  if (data.turn !== myRole) return;
  if (data.board[i]) return;
  if (data.status !== 'playing') return;

  const newBoard = [...data.board];
  newBoard[i] = myRole;

  const win = checkWin(newBoard, myRole);
  const full = newBoard.every(c => c);

  const updates = { board: newBoard };

  if (win) {
    updates.winner = myRole;
    updates.winLine = win;
    updates.status = 'ended';
    updates['scores/' + myRole] = (data.scores?.[myRole] || 0) + 1;
  } else if (full) {
    updates.status = 'draw';
    updates['scores/ties'] = (data.scores?.ties || 0) + 1;
  } else {
    updates.turn = myRole === 'X' ? 'O' : 'X';
  }

  await update(gameRef, updates);
}

// ── Replay ──
window.requestReplay = async function() {
  await update(ref(db, `rooms/${roomId}/replayVotes`), { [myRole]: true });

  // Check if both voted
  const snap = await get(ref(db, `rooms/${roomId}/replayVotes`));
  const votes = snap.val() || {};
  if (votes.X && votes.O) {
    await update(gameRef, {
      board: Array(9).fill(''),
      turn: 'X',
      status: 'playing',
      winner: null,
      winLine: null,
      replayVotes: null
    });
  }
};

// ── Check win ──
function checkWin(board, role) {
  for (const line of WIN_LINES) {
    if (line.every(i => board[i] === role)) return line;
  }
  return null;
}

// ── Leave ──
window.leaveGame = function() {
  if (presenceRef) set(presenceRef, false);
  roomId = null; myRole = null; myName = ''; gameRef = null; gameOver = false;
  clearRoomFromUrl();
  showSection('lobby');
};

// ── Copy link ──
window.copyLink = function() {
  const url = document.getElementById('shareUrl').textContent;
  navigator.clipboard.writeText(url).then(() => showToast('Link copied! 📋'));
};

// ── Board clicks ──
document.getElementById('board').addEventListener('click', e => {
  const cell = e.target.closest('.cell');
  if (!cell) return;
  makeMove(parseInt(cell.dataset.i));
});

// ── Buttons ──
document.getElementById('createBtn').addEventListener('click', createGame);
document.getElementById('joinBtn').addEventListener('click', joinGame);
document.getElementById('roomInput').addEventListener('keydown', e => {
  e.target.value = e.target.value.toUpperCase();
  if (e.key === 'Enter') joinGame();
});
document.getElementById('playerName').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const code = document.getElementById('roomInput').value.trim();
    if (code) joinGame(); else createGame();
  }
});

init();
</script>
</body>
</html>
